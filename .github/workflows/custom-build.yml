name: Custom Armbian Build

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board name'
        required: true
        default: 'x96q'
      branch:
        description: 'Branch'
        required: true
        default: 'current'
      release:
        description: 'Release'
        required: true
        default: 'trixie'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix COLUMNS environment variable
        run: |
          unset COLUMNS || true
          echo "COLUMNS=160" >> $GITHUB_ENV

      - name: Fix patching.py COLUMNS bug
        run: |
          sed -i 's/int(os.environ.get("COLUMNS", 160))/int(os.environ.get("COLUMNS") or 160)/g' lib/tools/patching.py

      - name: Build Armbian
        env:
          COLUMNS: "160"
          GITHUB_ACTIONS: ""
        run: |
          sudo --preserve-env=COLUMNS \
          ./compile.sh build \
            BOARD=${{ github.event.inputs.board }} \
            BRANCH=${{ github.event.inputs.branch }} \
            RELEASE=${{ github.event.inputs.release }} \
            BUILD_DESKTOP=yes \
            BUILD_MINIMAL=no \
            DESKTOP_APPGROUPS_SELECTED= \
            DESKTOP_ENVIRONMENT=xmonad \
            DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
            KERNEL_CONFIGURE=no \
            EXPERT=yes \
            KERNEL_BTF=no

      - name: Upload image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: armbian-${{ github.event.inputs.board }}-${{ github.event.inputs.release }}
          path: output/images/*.img.xz
          retention-days: 7

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .tmp/logs-*
          retention-days: 3
