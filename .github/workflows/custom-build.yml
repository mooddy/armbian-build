name: Custom Armbian Build

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board name'
        required: true
        default: 'x96q'
      branch:
        description: 'Branch'
        required: true
        default: 'current'
      release:
        description: 'Release'
        required: true
        default: 'trixie'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fix COLUMNS bug
        run: |
          unset COLUMNS || true
          echo "COLUMNS=160" >> $GITHUB_ENV
          sed -i 's/int(os.environ.get("COLUMNS", 160))/int(os.environ.get("COLUMNS") or 160)/g' lib/tools/patching.py

      - name: Cache Armbian sources and tools
        uses: actions/cache@v4
        with:
          path: |
            cache/sources
            cache/toolchains
            cache/rootfs
          key: armbian-cache-${{ github.event.inputs.board }}-${{ github.event.inputs.branch }}-${{ github.event.inputs.release }}-${{ github.run_id }}
          restore-keys: |
            armbian-cache-${{ github.event.inputs.board }}-${{ github.event.inputs.branch }}-${{ github.event.inputs.release }}-
            armbian-cache-${{ github.event.inputs.board }}-${{ github.event.inputs.branch }}-
            armbian-cache-${{ github.event.inputs.board }}-

      - name: Build Armbian
        env:
          COLUMNS: "160"
        run: |
          sudo --preserve-env=COLUMNS \
          ./compile.sh build \
            BOARD=${{ github.event.inputs.board }} \
            BRANCH=${{ github.event.inputs.branch }} \
            RELEASE=${{ github.event.inputs.release }} \
            BUILD_DESKTOP=yes \
            BUILD_MINIMAL=no \
            DESKTOP_APPGROUPS_SELECTED= \
            DESKTOP_ENVIRONMENT=xmonad \
            DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
            KERNEL_CONFIGURE=no \
            EXPERT=yes \
            KERNEL_BTF=no \
            SHARE_LOG=no \
            COMPRESS_OUTPUTIMAGE=xz

      - name: Find and verify image
        run: |
          echo "=== Output images ==="
          find output/images -type f 2>/dev/null || echo "No output/images dir"
          echo "=== All img files ==="
          find . -name "*.img*" 2>/dev/null | head -20

      - name: Compress image if not already compressed
        run: |
          cd output/images
          if ls *.img 1>/dev/null 2>&1; then
            echo "Found uncompressed .img files, compressing..."
            for f in *.img; do
              echo "Compressing $f with $(nproc) threads..."
              xz -T$(nproc) -6 "$f"
              echo "Done: ${f}.xz ($(du -h ${f}.xz | cut -f1))"
            done
          else
            echo "Images already compressed or not found"
            ls -lh
          fi

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-${{ github.event.inputs.board }}-${{ github.event.inputs.release }}-${{ github.run_number }}
          path: |
            output/images/*.img.xz
            output/images/*.img
            output/images/*.sha
            output/images/*.txt
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            .tmp/logs-*
            output/logs/
          retention-days: 3

      - name: Build summary
        if: success()
        run: |
          echo "## ✅ Armbian Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Board | ${{ github.event.inputs.board }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.inputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ github.event.inputs.release }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop | xmonad |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Output Files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh output/images/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⬇️ How to download" >> $GITHUB_STEP_SUMMARY
          echo "1. Scroll down to the **Artifacts** section below" >> $GITHUB_STEP_SUMMARY
          echo "2. Click **Armbian-${{ github.event.inputs.board }}-${{ github.event.inputs.release }}-${{ github.run_number }}**" >> $GITHUB_STEP_SUMMARY
          echo "3. Extract the zip and flash with **balenaEtcher**" >> $GITHUB_STEP_SUMMARY
